name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  BASE_NAME: mermaid-ascii-rust

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            archive: mermaid-ascii-rust-linux-x86_64.tar.gz
            binary: mermaid-ascii-rust
          - target: aarch64-unknown-linux-gnu
            archive: mermaid-ascii-rust-linux-aarch64.tar.gz
            binary: mermaid-ascii-rust
          - target: x86_64-pc-windows-gnu
            archive: mermaid-ascii-rust-windows-x86_64.zip
            binary: mermaid-ascii-rust.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build in Docker
        run: |
          docker build --build-arg TARGET=${{ matrix.target }} -t build-${{ matrix.target }} .

      - name: Extract binary
        run: |
          docker create --name extract build-${{ matrix.target }}
          docker cp extract:/out/${{ matrix.binary }} ./${{ matrix.binary }}
          docker rm extract

      - name: Package (tar.gz)
        if: "!contains(matrix.archive, '.zip')"
        run: tar czf ${{ matrix.archive }} ${{ matrix.binary }}

      - name: Package (zip)
        if: contains(matrix.archive, '.zip')
        run: zip ${{ matrix.archive }} ${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  build-macos:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: mermaid-ascii-rust-macos-aarch64.tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            archive: mermaid-ascii-rust-macos-x86_64.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run tests
        run: cargo test --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.archive }} mermaid-ascii-rust

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    runs-on: ubuntu-latest
    needs: [build, build-macos]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
