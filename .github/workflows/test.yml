name: auto Test

on:
  push:
    tags:
      - 'v*'

jobs:
  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Download homunc
        run: |
          wget -q https://github.com/homun-lang/homun/releases/latest/download/homunc-linux-x86_64 -O /usr/local/bin/homunc
          chmod +x /usr/local/bin/homunc
        continue-on-error: true

      - name: Rust format check
        run: cargo fmt -- --check

      - name: Rust clippy
        run: cargo clippy -- -D warnings

      - name: Rust unit + integration tests
        run: cargo test

  test-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-

      - name: Download homunc
        run: |
          wget -q https://github.com/homun-lang/homun/releases/latest/download/homunc-linux-x86_64 -O /usr/local/bin/homunc
          chmod +x /usr/local/bin/homunc
        continue-on-error: true

      - name: Build WASM
        run: cargo build --lib --target wasm32-unknown-unknown --no-default-features --features wasm
